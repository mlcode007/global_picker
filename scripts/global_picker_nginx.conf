# nginx : /etc/nginx/sites-available/global_picker
server {
    listen 80;
    server_name 47.238.72.198;

    # 前端静态文件
    root /root/global_picker/frontend/dist;
    index index.html;

    # gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # API 反向代理到 FastAPI 后端
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 代理缓冲区配置 - 支持大响应体
        # proxy_buffering on;
        # proxy_buffer_size 16k;
        # proxy_buffers 8 32k;
        # proxy_busy_buffers_size 64k;
        # proxy_max_temp_file_size 100m;
        proxy_buffering on;
        proxy_buffer_size 64k;
        proxy_buffers 80 64k;
        proxy_busy_buffers_size 256k;
        proxy_max_temp_file_size 500m;

        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
    }

    # artifacts 静态资源代理
    location /artifacts/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Swagger 文档代理
    location /docs {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /openapi.json {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
    }

    # Vue Router history 模式 - 所有其他路由回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}