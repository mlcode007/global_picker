# HTTP 服务器 - 重定向到 HTTPS
server {
    listen 80;
    server_name www.globalpicker.com globalpicker.com 47.238.72.198;
    
    # Let's Encrypt 验证路径（用于证书续期）
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    
    # 其他所有请求重定向到 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 服务器
server {
    listen 443 ssl http2;
    server_name www.globalpicker.com globalpicker.com 47.238.72.198;
    
    # SSL 证书路径
    ssl_certificate /etc/letsencrypt/live/www.globalpicker.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.globalpicker.com/privkey.pem;
    
    # SSL 优化配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;
    
    # 安全头
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    
    # 前端静态文件
    root /root/global_picker/frontend/dist;
    index index.html;
    
    # gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;
    
    # API 反向代理到 FastAPI 后端
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_buffering on;
        proxy_buffer_size 64k;
        proxy_buffers 80 64k;
        proxy_busy_buffers_size 256k;
        proxy_max_temp_file_size 500m;
        
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
    }
    
    # artifacts 静态资源代理
    location /artifacts/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    # Swagger 文档代理
    location /docs {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    location /openapi.json {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
    }
    
    # Vue Router history 模式 - 所有其他路由回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
